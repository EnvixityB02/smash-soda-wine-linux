name: Claude Code
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, synchronize]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'pull_request' && github.event.action != 'synchronize') ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Environment
        run: |
          curl -fsSL https://bun.sh/install | bash
          mkdir -p $HOME/.claude-code-router
          cat << 'EOF' > $HOME/.claude-code-router/config.json
          {
            "LOG": true,
            "NON_INTERACTIVE_MODE": true,
            "API_TIMEOUT_MS": 600000,
            "HOST": "127.0.0.1",
            "PORT": 3456,
            "transformers": [],
            "Providers": [
              {
                "name": "openrouter",
                "api_base_url": "https://openrouter.ai/api/v1/chat/completions",
                "api_key": "${{ secrets.OPENROUTER_API_KEY }}",
                "models": [
                  "qwen/qwen3-coder:free",
                  "meta-llama/llama-3.3-70b-instruct:free",
                  "meta-llama/llama-3.3-70b-instruct:online",
                  "openrouter/free"
                ],
                "transformer": {
                  "use": ["openrouter", ["maxtoken", { "max_tokens": 16000 }]]
                }
              },
              {
                "name": "groq",
                "api_base_url": "https://api.groq.com/openai/v1/chat/completions",
                "api_key": "${{ secrets.GROQ_API_KEY }}",
                "models": [
                  "llama-3.3-70b-versatile",
                  "llama-3.1-8b-instant",
                  "qwen-2.5-coder-32b",
                  "groq/compound"
                ],
                "transformer": {
                  "use": ["groq"]
                }
              }
            ],
            "Router": {
              "default": "openrouter,openrouter/free",
              "background": "openrouter,openrouter/free",
              "think": "openrouter,openrouter/free",
              "longContext": "openrouter,openrouter/free",
              "longContextThreshold": 60000,
              "webSearch": "openrouter,openrouter/free",
              "image": "openrouter,openrouter/free"
            }
          }
          EOF
        shell: bash

      - name: Start Claude Code Router
        run: |
          nohup ~/.bun/bin/bunx @musistudio/claude-code-router@latest start &
          sleep 3
        shell: bash

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: http://127.0.0.1:3456
        with:
          anthropic_api_key: "used-for-local-routing"
          allowed_tools: "Bash,Read,Write,Glob,Grep,LS,mcp__github_comment__update_claude_comment"