name: Claude Code
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, synchronize]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'pull_request' && github.event.action != 'synchronize') || 
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Environment
        run: |
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          
          mkdir -p $HOME/.claude-code-router
          cat << EOF > $HOME/.claude-code-router/config.json
          {
            "log": true,
            "NON_INTERACTIVE_MODE": true,
            "API_TIMEOUT_MS": 600000,
            "HOST": "127.0.0.1",
            "PORT": 3456,
            "transformers": ["groq"],
            "Providers": [
              {
                "name": "groq",
                "api_base_url": "https://api.groq.com/openai/v1/chat/completions",
                "api_key": "$GROQ_API_KEY",
                "models": [
                  "llama-3.3-70b-versatile",
                  "llama-3.1-8b-instant",
                  "qwen-2.5-coder-32b",
                  "groq/compound"
                ],
                "transformer": {
                  "use": ["groq"]
                }
              }
            ],
            "Router": {
              "default": "groq,llama-3.3-70b-versatile",
              "background": "groq,llama-3.1-8b-instant",
              "think": "groq,llama-3.3-70b-versatile",
              "longContext": "groq,llama-3.3-70b-versatile",
              "longContextThreshold": 60000,
              "webSearch": "groq,groq/compound",
              "image": "groq,llama-3.3-70b-versatile"
            }
          }
          EOF
        shell: bash
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Start Claude Code Router
        run: |
          nohup $HOME/.bun/bin/bunx @musistudio/claude-code-router@latest start > router.log 2>&1 &
          # Wait for the port to open
          for i in {1..15}; do
            if nc -z 127.0.0.1 3456; then
              echo "Router is active on port 3456"
              break
            fi
            sleep 1
          done
        shell: bash

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: http://127.0.0.1:3456/v1
        with:
          anthropic_api_key: "used-for-local-routing"